name: Self-Healing CI Pipeline

on:
  push:
    branches: main
  pull_request:
    paths:
      - '**.go'
      - 'pkg/workflow/**'
      - 'actions/**'
      - '.github/workflows/self-healing-ci.yml'
      - '.github/workflows/**/*.md'
      - 'docs/src/components/**/*.astro'
  workflow_dispatch:
    inputs:
      force_healing:
        description: 'Force run auto-healing even if tests pass'
        required: false
        default: false

env:
  GO_VERSION: '1.25.0'
  CACHE_VERSION: 'v1'

jobs:
  # ============================================================
  # Part 1: Smart Test Execution with Flaky Test Detection
  # ============================================================
  test-with-flaky-detection:
    name: 🔄 Test Execution & Flaky Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      test_failed: ${{ steps.run-tests.outcome != 'success' }}
      failed_tests: ${{ steps.parse-failures.outputs.failed_tests }}
      failure_summary: ${{ steps.parse-failures.outputs.summary }}
      flaky_tests: ${{ steps.detect-flaky.outputs.flaky }}
      test_duration: ${{ steps.run-tests.outputs.duration }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🔧 Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: 📊 Report Go cache status
        run: |
          if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📥 Download dependencies with retry
        run: |
          set -e
          MAX_RETRIES=3
          RETRY_DELAY=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
            if go mod download -x; then
              echo "✅ Successfully downloaded Go modules"
              break
            else
              EXIT_CODE=$?
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
                exit 1
              fi
              echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

      - name: ✅ Verify dependencies
        run: go mod verify
        
      - name: 🧪 Run unit tests with coverage (First Attempt)
        id: run-tests
        continue-on-error: true
        run: |
          set -o pipefail
          START_TIME=$(date +%s)
          go test -v -parallel=8 -timeout=5m -run='^Test' \
            -tags '!integration' \
            -coverprofile=coverage.out \
            -json ./... | tee test-result.json
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          go tool cover -html=coverage.out -o coverage.html

      - name: 🔍 Parse test failures
        id: parse-failures
        if: failure()
        continue-on-error: true
        run: |
          python3 - << 'EOF'
          import json
          failed_tests = []
          summary = ""
          try:
              with open('test-result.json','r') as f:
                  for line in f:
                      try:
                          entry = json.loads(line.strip())
                          if entry.get('Action')=='fail':
                              failed_tests.append(entry.get('Test','unknown'))
                      except:
                          pass
              if failed_tests:
                  summary = f"❌ {len(failed_tests)} test(s) failed:\n" + "\n".join(failed_tests[:10])
                  if len(failed_tests)>10:
                      summary += f"\n... and {len(failed_tests)-10} more"
              with open('/tmp/failed_tests.txt','w') as f:
                  f.write('\n'.join(failed_tests))
              with open('/tmp/test_summary.txt','w') as f:
                  f.write(summary)
          except Exception as e:
              print(f"Error parsing tests: {e}")
          EOF
          
          FAILED_TESTS=$(cat /tmp/failed_tests.txt 2>/dev/null || echo "")
          SUMMARY=$(cat /tmp/test_summary.txt 2>/dev/null || echo "Unable to parse failures")
          echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔄 Auto-Retry Failed Tests
        id: retry-tests
        if: failure()
        continue-on-error: true
        run: |
          FAILED_TESTS=$(cat /tmp/failed_tests.txt 2>/dev/null | tr '\n' '|' | sed 's/|$//')
          if [ -z "$FAILED_TESTS" ]; then
            echo "No failed tests to retry"
            exit 0
          fi
          RETRY_PATTERN="^($(echo $FAILED_TESTS | sed 's/ /|/g'))"
          go test -v -parallel=4 -timeout=3m \
            -run="$RETRY_PATTERN" \
            -tags '!integration' \
            -json ./... | tee test-result-retry.json || true

      - name: 🚨 Detect Flaky Tests
        id: detect-flaky
        if: always()
        run: |
          python3 - << 'EOF'
          import json, os
          flaky_tests=[]
          if os.path.exists('test-result-retry.json'):
              passed=set()
              try:
                  with open('test-result-retry.json','r') as f:
                      for line in f:
                          try:
                              entry=json.loads(line.strip())
                              if entry.get('Action')=='pass':
                                  passed.add(entry.get('Test',''))
                          except:
                              pass
                  flaky_tests=list(passed)
              except:
                  pass
          with open('/tmp/flaky_tests.txt','w') as f:
              f.write('\n'.join(flaky_tests))
          print(f"Flaky tests detected: {len(flaky_tests)}")
          EOF
          
          FLAKY=$(cat /tmp/flaky_tests.txt 2>/dev/null || echo "")
          echo "flaky<<EOF" >> $GITHUB_OUTPUT
          echo "$FLAKY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📈 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-result*.json
            coverage.html
            coverage.out
          retention-days: 30

      - name: 📝 Create test summary
        if: always()
        run: |
          TOTAL=$(grep -c '"Action"' test-result.json || echo "0")
          PASSED=$(grep -c '"Action":"pass"' test-result.json || echo "0")
          FAILED=$(grep -c '"Action":"fail"' test-result.json || echo "0")
          FLAKY=$(cat /tmp/flaky_tests.txt 2>/dev/null | grep -c ^ || echo "0")

          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed ✅ | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed ❌ | $FAILED |" >> $GITHUB_STEP_SUMMARY
          if [ $FAILED -gt 0 ]; then
            echo "| Flaky 🔴 | $FLAKY |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Part 1b: Astro YAML Front Matter Validation
  # ============================================================
  validate-astro-frontmatter:
    name: ⚡ Validate Astro YAML Front Matter
    runs-on: ubuntu-latest
    needs: test-with-flaky-detection
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🔍 Lint Astro YAML Front Matter
        run: |
          pip install yamllint
          find docs/src/components -name '*.astro' | while read f; do
            FRONTMATTER=$(awk '/^---/{flag=!flag;next} flag' "$f")
            if [ -n "$FRONTMATTER" ]; then
              echo "$FRONTMATTER" | yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" || exit 1
            fi
          done

# The rest of your workflow (AI Failure Analysis, MTTR metrics) remains unchanged
