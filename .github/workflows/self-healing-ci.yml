name: 🤖 Self-Healing CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - '**.go'
      - 'pkg/workflow/**'
      - 'actions/**'
      - '.github/workflows/self-healing-ci.yml'
      - '.github/workflows/**/*.md'
  workflow_dispatch:
    inputs:
      force_healing:
        description: 'Force run auto-healing even if tests pass'
        required: false
        default: false

env:
  GO_VERSION: '1.25.0'
  CACHE_VERSION: 'v1'

jobs:
  # ============================================================
  # Part 1: Smart Test Execution with Flaky Test Detection
  # ============================================================
  test-with-flaky-detection:
    name: 🔄 Test Execution & Flaky Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      test_failed: ${{ steps.run-tests.outcome != 'success' }}
      failed_tests: ${{ steps.parse-failures.outputs.failed_tests }}
      failure_summary: ${{ steps.parse-failures.outputs.summary }}
      flaky_tests: ${{ steps.detect-flaky.outputs.flaky }}
      test_duration: ${{ steps.run-tests.outputs.duration }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🔧 Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: 📊 Report Go cache status
        run: |
          if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📥 Download dependencies with retry
        run: |
          set -e
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
            if go mod download -x; then
              echo "✅ Successfully downloaded Go modules"
              break
            else
              EXIT_CODE=$?
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
                exit 1
              fi
              echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

      - name: ✅ Verify dependencies
        run: go mod verify
        
      - name: 🧪 Run unit tests with coverage (First Attempt)
        id: run-tests
        continue-on-error: true
        run: |
          set -o pipefail
          START_TIME=$(date +%s)
          
          go test -v -parallel=8 -timeout=5m -run='^Test' \
            -tags '!integration' \
            -coverprofile=coverage.out \
            -json ./... | tee test-result.json
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          
          go tool cover -html=coverage.out -o coverage.html

      - name: 🔍 Parse test failures
        id: parse-failures
        if: failure()
        continue-on-error: true
        run: |
          python3 - << 'EOF'
          import json
          failed_tests = []
          summary = ""
          try:
              with open('test-result.json','r') as f:
                  for line in f:
                      try:
                          entry = json.loads(line.strip())
                          if entry.get('Action')=='fail':
                              failed_tests.append(entry.get('Test','unknown'))
                      except:
                          pass
              if failed_tests:
                  summary = f"❌ {len(failed_tests)} test(s) failed:\n" + "\n".join(failed_tests[:10])
                  if len(failed_tests)>10:
                      summary += f"\n... and {len(failed_tests)-10} more"
              with open('/tmp/failed_tests.txt','w') as f:
                  f.write('\n'.join(failed_tests))
              with open('/tmp/test_summary.txt','w') as f:
                  f.write(summary)
          except Exception as e:
              print(f"Error parsing tests: {e}")
          EOF
          
          FAILED_TESTS=$(cat /tmp/failed_tests.txt 2>/dev/null || echo "")
          SUMMARY=$(cat /tmp/test_summary.txt 2>/dev/null || echo "Unable to parse failures")
          echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔄 Auto-Retry Failed Tests
        id: retry-tests
        if: failure()
        continue-on-error: true
        run: |
          FAILED_TESTS=$(cat /tmp/failed_tests.txt 2>/dev/null | tr '\n' '|' | sed 's/|$//')
          if [ -z "$FAILED_TESTS" ]; then
            echo "No failed tests to retry"
            exit 0
          fi
          RETRY_PATTERN="^($(echo $FAILED_TESTS | sed 's/ /|/g'))"
          go test -v -parallel=4 -timeout=3m \
            -run="$RETRY_PATTERN" \
            -tags '!integration' \
            -json ./... | tee test-result-retry.json || true

      - name: 🚨 Detect Flaky Tests
        id: detect-flaky
        if: always()
        run: |
          python3 - << 'EOF'
          import json, os
          flaky_tests=[]
          if os.path.exists('test-result-retry.json'):
              passed=set()
              try:
                  with open('test-result-retry.json','r') as f:
                      for line in f:
                          try:
                              entry=json.loads(line.strip())
                              if entry.get('Action')=='pass':
                                  passed.add(entry.get('Test',''))
                          except:
                              pass
                  flaky_tests=list(passed)
              except:
                  pass
          with open('/tmp/flaky_tests.txt','w') as f:
              f.write('\n'.join(flaky_tests))
          print(f"Flaky tests detected: {len(flaky_tests)}")
          EOF
          
          FLAKY=$(cat /tmp/flaky_tests.txt 2>/dev/null || echo "")
          echo "flaky<<EOF" >> $GITHUB_OUTPUT
          echo "$FLAKY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📈 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-result*.json
            coverage.html
            coverage.out
          retention-days: 30

      - name: 📝 Create test summary
        if: always()
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -c '"Action"' test-result.json || echo "0")
          PASSED=$(grep -c '"Action":"pass"' test-result.json || echo "0")
          FAILED=$(grep -c '"Action":"fail"' test-result.json || echo "0")
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed ✅ | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed ❌ | $FAILED |" >> $GITHUB_STEP_SUMMARY
          if [ $FAILED -gt 0 ]; then
            echo "| Flaky 🔴 | $(cat /tmp/flaky_tests.txt 2>/dev/null | grep -c ^ || echo "0") |" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Part 2: AI-Powered Log Analysis & Root Cause Detection
  # ============================================================
  analyze-failures:
    name: 🤖 AI Failure Analysis
    runs-on: ubuntu-latest
    needs: test-with-flaky-detection
    if: failure() || needs.test-with-flaky-detection.outputs.test_failed == 'true'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 📥 Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-artifacts

      - name: 🔍 Analyze failure logs
        id: analyze
        run: |
          python3 - << 'EOF'
          import json, re, os
          from datetime import datetime
          report={"timestamp":datetime.now().isoformat(),"failed_tests":[],"root_causes":[],"suggested_fixes":[],"confidence_score":0}
          ffile='./test-artifacts/test-result.json'
          if os.path.exists(ffile):
              with open(ffile,'r') as f:
                  for line in f:
                      try:
                          entry=json.loads(line.strip())
                          if entry.get('Action')=='fail':
                              report['failed_tests'].append({'name':entry.get('Test','unknown'),'output':entry.get('Output','')[:500]})
                      except: pass
          patterns={"timeout":("(?i)(timeout|deadline exceeded|context deadline)","Test timeout or deadline exceeded","Increase test timeout or optimize slow operations"),
                    "network":("(?i)(connection refused|network|DNS|socket|ECONNREFUSED)","Network connectivity issue","Check network dependencies or mock external services"),
                    "import":("(?i)(no such file|import error|cannot find|undefined)","Missing import or file dependency","Verify all dependencies are installed"),
                    "assertion":("(?i)(assertion failed|expected.*got|not equal)","Test assertion failure","Review test logic or expected values"),
                    "panic":("(?i)(panic|fatal|segmentation fault)","Runtime panic in test","Add error handling or nil checks")}
          found=set()
          for t in report["failed_tests"]:
              out=t["output"]
              for k,v in patterns.items():
                  if re.search(v[0],out): found.add(k)
          for k in list(found)[:3]:
              report["root_causes"].append(patterns[k][1])
              report["suggested_fixes"].append(patterns[k][2])
          if found: report["confidence_score"]=min(90,50+len(found)*15)
          with open('/tmp/analysis_report.json','w') as f: json.dump(report,f,indent=2)
          print(json.dumps(report,indent=2))
          EOF

      - name: 💬 Post AI Analysis to PR
        if: github.event_name == 'pull_request' && steps.analyze.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = JSON.parse(fs.readFileSync('/tmp/analysis_report.json', 'utf8'));
            let comment = `## 🤖 AI-Powered Failure Analysis\n\n`;
            if (analysis.failed_tests.length>0){
              comment+=`### 📍 Failed Tests (${analysis.failed_tests.length})\n`;
              analysis.failed_tests.slice(0,5).forEach(t=>comment+=`- \`${t.name}\`\n`);
              if(analysis.failed_tests.length>5) comment+=`- ... and ${analysis.failed_tests.length-5} more\n`;
              comment+='\n'}
            if(analysis.root_causes.length>0){
              comment+=`### 🔍 Root Cause Analysis\n`;
              analysis.root_causes.forEach((cause,idx)=>{
                const fix=analysis.suggested_fixes[idx]||'';
                comment+=`\n**${idx+1}. ${cause}**\n- 💡 Suggestion: ${fix}\n- Confidence: ${analysis.confidence_score}%\n`;
              });
            }
            const {data: comments}=await github.rest.issues.listComments({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number});
            const botComment=comments.find(c=>c.user.type==='Bot' && c.body.includes('AI-Powered Failure Analysis'));
            if(botComment){
              await github.rest.issues.updateComment({owner:context.repo.owner,repo:context.repo.repo,comment_id:botComment.id,body:comment});
            } else {
              await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,body:comment});
            }

  # ============================================================
  # Part 3: MTTR Metrics Collection & Dashboard Update
  # ============================================================
  collect-metrics:
    name: 📊 MTTR Metrics Collection
    runs-on: ubuntu-latest
    needs: test-with-flaky-detection
    if: always()
    permissions:
      contents: write
      actions: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 📥 Download test results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-artifacts

      - name: 📈 Compute MTTR metrics
        id: metrics
        run: |
          python3 - << 'EOF'
          import json, os
          from datetime import datetime
          metrics={"timestamp":datetime.now().isoformat(),
                   "workflow_run_id":"${{ github.run_id }}",
                   "branch":"${{ github.ref }}",
                   "test_passed":"${{ needs.test-with-flaky-detection.outputs.test_failed }}"=="false",
                   "test_duration_seconds":int("${{ needs.test-with-flaky-detection.outputs.test_duration }}" or "0"),
                   "build_failure_rate":0,"mttr_minutes":0,"auto_fixed_incidents_percent":0,"flaky_tests_count":0}
          if "${{ needs.test-with-flaky-detection.outputs.flaky_tests }}"!="":
              metrics["flaky_tests_count"]=len([t for t in "${{ needs.test-with-flaky-detection.outputs.flaky_tests }}".split('\n') if t.strip()])
          metrics_file='.github/metrics/ci-metrics.json'
          history=[]
          if os.path.exists(metrics_file):
              try:
                  with open(metrics_file,'r') as f:
                      data=json.load(f)
                      if isinstance(data,list): history=data[-29:]
              except: pass
          history.append(metrics)
          os.makedirs('.github/metrics',exist_ok=True)
          with open(metrics_file,'w') as f: json.dump(history,f,indent=2)
          recent=[m for m in history if (datetime.now()-datetime.fromisoformat(m['timestamp'])).days<7]
          if recent:
              failed=sum(1 for m in recent if not m['test_passed'])
              failure_rate=(failed/len(recent)*100) if recent else 0
              auto_fixed=sum(1 for m in recent if m['flaky_tests_count']>0 and m['test_passed'])
              auto_fixed_percent=(auto_fixed/len(recent)*100) if recent else 0
              avg_mttr=sum(m['test_duration_seconds'] for m in recent)/len(recent)/60 if recent else 0
              metrics['build_failure_rate']=round(failure_rate,2)
              metrics['mttr_minutes']=round(avg_mttr,2)
              metrics['auto_fixed_incidents_percent']=round(auto_fixed_percent,2)
          with open('/tmp/current_metrics.json','w') as f: json.dump(metrics,f)
          EOF

      - name: 📊 Generate MTTR Dashboard
        run: |
          python3 - << 'EOF'
          import json, os
          metrics_file='.github/metrics/ci-metrics.json'
          if not os.path.exists(metrics_file): exit(0)
          with open(metrics_file,'r') as f: history=json.load(f)
          dashboard_html="""<!DOCTYPE html><html><head><title>Self-Healing CI Dashboard</title><style>
          body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;margin:20px;background:#f5f5f5}
          .container{max-width:1200px;margin:0 auto}.header{text-align:center;margin-bottom:40px}.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:40px}
          .metric-card{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
          .metric-value{font-size:32px;font-weight:bold;color:#0969da}.metric-label{font-size:14px;color:#666;margin-top:8px}
          .status-good{color:#28a745}.status-warning{color:#ffc107}.status-bad{color:#dc3545}
          .chart{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px}
          table{width:100%;border-collapse:collapse}th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}th{background:#f5f5f5;font-weight:600}tr:hover{background:#f9f9f9}
          </style></head><body><div class="container"><div class="header"><h1>🤖 Self-Healing CI Pipeline Dashboard</h1><p>Real-time metrics for build reliability and incident recovery</p></div><div class="metric-grid">"""
          if history:
              recent_7d=[m for m in history[-30:] if m.get('test_passed')]
              failed_count=sum(1 for m in history[-30:] if not m.get('test_passed'))
              failure_rate=(failed_count/len(history[-30:])*100) if history else 0
              auto_fixed=sum(1 for m in history[-30:] if m.get('flaky_tests_count',0)>
