name: 🤖 Self-Healing CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - '**.go'
      - 'pkg/workflow/**'
      - 'actions/**'
      - '.github/workflows/self-healing-ci.yml'
      - '.github/workflows/**/*.md'
  workflow_dispatch:
    inputs:
      force_healing:
        description: 'Force run auto-healing even if tests pass'
        required: false
        default: false

env:
  GO_VERSION: '1.25.0'
  CACHE_VERSION: 'v1'

jobs:
  # ============================================================
  # Part 1: Smart Test Execution with Flaky Test Detection
  # ============================================================
  test-with-flaky-detection:
    name: 🔄 Test Execution & Flaky Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      test_failed: ${{ steps.run-tests.outcome != 'success' }}
      failed_tests: ${{ steps.parse-failures.outputs.failed_tests }}
      failure_summary: ${{ steps.parse-failures.outputs.summary }}
      flaky_tests: ${{ steps.detect-flaky.outputs.flaky }}
      test_duration: ${{ steps.run-tests.outputs.duration }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0  # Full history for analysis

      - name: 🔧 Set up Go
        id: setup-go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: 📊 Report Go cache status
        run: |
          if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📥 Download dependencies with retry
        run: |
          set -e
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
            if go mod download -x; then
              echo "✅ Successfully downloaded Go modules"
              break
            else
              EXIT_CODE=$?
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
                exit 1
              fi
              echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

      - name: ✅ Verify dependencies
        run: go mod verify
        
      - name: 🧪 Run unit tests with coverage (First Attempt)
        id: run-tests
        continue-on-error: true
        run: |
          set -o pipefail
          START_TIME=$(date +%s)
          
          go test -v -parallel=8 -timeout=5m -run='^Test' \
            -tags '!integration' \
            -coverprofile=coverage.out \
            -json ./... | tee test-result.json
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          
          go tool cover -html=coverage.out -o coverage.html

      - name: 🔍 Parse test failures
        id: parse-failures
        if: failure()
        continue-on-error: true
        run: |
          python3 - << 'EOF'
          import json
          import re
          
          failed_tests = []
          test_summary = ""
          
          try:
              with open('test-result.json', 'r') as f:
                  for line in f:
                      try:
                          entry = json.loads(line.strip())
                          if entry.get('Action') == 'fail':
                              test_name = entry.get('Test', 'unknown')
                              failed_tests.append(test_name)
              
              if failed_tests:
                  test_summary = f"❌ {len(failed_tests)} test(s) failed:\n"
                  for test in failed_tests[:10]:  # Show first 10
                      test_summary += f"  - {test}\n"
                  if len(failed_tests) > 10:
                      test_summary += f"  ... and {len(failed_tests) - 10} more\n"
              
              with open('/tmp/failed_tests.txt', 'w') as f:
                  f.write('\n'.join(failed_tests))
              
              with open('/tmp/test_summary.txt', 'w') as f:
                  f.write(test_summary)
          except Exception as e:
              print(f"Error parsing tests: {e}")
          EOF
          
          FAILED_TESTS=$(cat /tmp/failed_tests.txt 2>/dev/null || echo "")
          SUMMARY=$(cat /tmp/test_summary.txt 2>/dev/null || echo "Unable to parse failures")
          
          echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔄 Auto-Retry Failed Tests
        id: retry-tests
        if: failure()
        continue-on-error: true
        run: |
          echo "🔄 Retrying failed tests..."
          
          FAILED_TESTS=$(cat /tmp/failed_tests.txt 2>/dev/null | tr '\n' '|' | sed 's/|$//')
          
          if [ -z "$FAILED_TESTS" ]; then
            echo "No failed tests to retry"
            exit 0
          fi
          
          echo "Retrying: $FAILED_TESTS"
          
          RETRY_PATTERN="^($(echo $FAILED_TESTS | sed 's/ /|/g'))"
          
          go test -v -parallel=4 -timeout=3m \
            -run="$RETRY_PATTERN" \
            -tags '!integration' \
            -json ./... | tee test-result-retry.json || true

      - name: 🚨 Detect Flaky Tests
        id: detect-flaky
        if: always()
        run: |
          python3 - << 'EOF'
          import json
          import os
          
          flaky_tests = []
          
          # Check if retry test results exist
          if os.path.exists('test-result-retry.json'):
              failed_in_retry = set()
              passed_in_retry = set()
              
              try:
                  with open('test-result-retry.json', 'r') as f:
                      for line in f:
                          try:
                              entry = json.loads(line.strip())
                              test_name = entry.get('Test', '')
                              if entry.get('Action') == 'fail':
                                  failed_in_retry.add(test_name)
                              elif entry.get('Action') == 'pass':
                                  passed_in_retry.add(test_name)
                          except:
                              pass
                  
                  # Tests that passed in retry were flaky (failed first, passed second)
                  flaky = list(passed_in_retry)
                  flaky_tests = flaky
              except:
                  pass
          
          flaky_str = '\n'.join(flaky_tests)
          
          with open('/tmp/flaky_tests.txt', 'w') as f:
              f.write(flaky_str)
          
          print(f"Flaky tests detected: {len(flaky_tests)}")
          for test in flaky_tests:
              print(f"  🔴 {test}")
          EOF
          
          FLAKY=$(cat /tmp/flaky_tests.txt 2>/dev/null || echo "")
          echo "flaky<<EOF" >> $GITHUB_OUTPUT
          echo "$FLAKY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📈 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            test-result*.json
            coverage.html
            coverage.out
          retention-days: 30

      - name: 📝 Create test summary
        if: always()
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f test-result.json ]; then
            TOTAL=$(grep -c '"Action"' test-result.json || echo "0")
            PASSED=$(grep -c '"Action":"pass"' test-result.json || echo "0")
            FAILED=$(grep -c '"Action":"fail"' test-result.json || echo "0")
            
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed ✅ | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed ❌ | $FAILED |" >> $GITHUB_STEP_SUMMARY
            
            if [ $FAILED -gt 0 ]; then
              echo "| Flaky 🔴 | $(cat /tmp/flaky_tests.txt 2>/dev/null | grep -c ^ || echo "0") |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # ============================================================
  # Part 2: AI-Powered Log Analysis & Root Cause Detection
  # ============================================================
  analyze-failures:
    name: 🤖 AI Failure Analysis
    runs-on: ubuntu-latest
    needs: test-with-flaky-detection
    if: failure() || needs.test-with-flaky-detection.outputs.test_failed == 'true'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: 📥 Download test results
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: test-results
          path: ./test-artifacts

      - name: 🔍 Analyze failure logs
        id: analyze
        run: |
          python3 - << 'EOF'
          import json
          import re
          import os
          from datetime import datetime
          
          analysis_report = {
              "timestamp": datetime.now().isoformat(),
              "failed_tests": [],
              "root_causes": [],
              "suggested_fixes": [],
              "confidence_score": 0
          }
          
          # Parse test results
          test_file = './test-artifacts/test-result.json'
          if os.path.exists(test_file):
              with open(test_file, 'r') as f:
                  for line in f:
                      try:
                          entry = json.loads(line.strip())
                          if entry.get('Action') == 'fail':
                              test = entry.get('Test', 'unknown')
                              output = entry.get('Output', '')
                              analysis_report["failed_tests"].append({
                                  "name": test,
                                  "output": output[:500]  # First 500 chars
                              })
                      except:
                          pass
          
          # Common failure patterns
          patterns = {
              "timeout": {
                  "regex": r"(?i)(timeout|deadline exceeded|context deadline)",
                  "cause": "Test timeout or deadline exceeded",
                  "fix": "Increase test timeout or optimize slow operations"
              },
              "network": {
                  "regex": r"(?i)(connection refused|network|DNS|socket|ECONNREFUSED)",
                  "cause": "Network connectivity issue",
                  "fix": "Check network dependencies or mock external services"
              },
              "import": {
                  "regex": r"(?i)(no such file|import error|cannot find|undefined)",
                  "cause": "Missing import or file dependency",
                  "fix": "Verify all dependencies are installed"
              },
              "assertion": {
                  "regex": r"(?i)(assertion failed|expected.*got|not equal)",
                  "cause": "Test assertion failure",
                  "fix": "Review test logic or expected values"
              },
              "panic": {
                  "regex": r"(?i)(panic|fatal|segmentation fault)",
                  "cause": "Runtime panic in test",
                  "fix": "Add error handling or nil checks"
              }
          }
          
          # Analyze patterns
          root_causes_found = set()
          for test in analysis_report["failed_tests"]:
              output = test.get("output", "")
              for pattern_name, pattern_info in patterns.items():
                  if re.search(pattern_info["regex"], output):
                      root_causes_found.add(pattern_name)
          
          # Build analysis report
          for pattern_name in list(root_causes_found)[:3]:  # Top 3
              pattern_info = patterns[pattern_name]
              analysis_report["root_causes"].append(pattern_info["cause"])
              analysis_report["suggested_fixes"].append(pattern_info["fix"])
          
          if root_causes_found:
              analysis_report["confidence_score"] = min(90, 50 + len(root_causes_found) * 15)
          
          # Save report
          with open('/tmp/analysis_report.json', 'w') as f:
              json.dump(analysis_report, f, indent=2)
          
          print(json.dumps(analysis_report, indent=2))
          EOF
          
          # Export analysis for use in PR comment
          echo "analysis_complete=true" >> $GITHUB_OUTPUT

      - name: 💬 Post AI Analysis to PR
        if: github.event_name == 'pull_request' && steps.analyze.outcome == 'success'
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca1c5290e953e # v7
        with:
          script: |
            const fs = require('fs');
            const analysis = JSON.parse(fs.readFileSync('/tmp/analysis_report.json', 'utf8'));
            
            let comment = `## 🤖 AI-Powered Failure Analysis\n\n`;
            
            if (analysis.failed_tests.length > 0) {
                comment += `### 📍 Failed Tests (${analysis.failed_tests.length})\n`;
                analysis.failed_tests.slice(0, 5).forEach(test => {
                    comment += `- \`${test.name}\`\n`;
                });
                if (analysis.failed_tests.length > 5) {
                    comment += `- ... and ${analysis.failed_tests.length - 5} more\n`;
                }
                comment += '\n';
            }
            
            if (analysis.root_causes.length > 0) {
                comment += `### 🔍 Root Cause Analysis\n`;
                analysis.root_causes.forEach((cause, idx) => {
                    const fix = analysis.suggested_fixes[idx] || '';
                    comment += `\n**${idx + 1}. ${cause}**\n`;
                    comment += `- 💡 Suggestion: ${fix}\n`;
                    comment += `- Confidence: ${analysis.confidence_score}%\n`;
                });
            }
            
            // Find or create comment
            const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
            });
            
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('AI-Powered Failure Analysis'));
            
            if (botComment) {
                await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: botComment.id,
                    body: comment
                });
            } else {
                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: comment
                });
            }

  # ============================================================
  # Part 3: MTTR Metrics Collection & Dashboard Update
  # ============================================================
  collect-metrics:
    name: 📊 MTTR Metrics Collection
    runs-on: ubuntu-latest
    needs: test-with-flaky-detection
    if: always()
    permissions:
      contents: write
      actions: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: 📥 Download test results
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: test-results
          path: ./test-artifacts

      - name: 📈 Compute MTTR metrics
        id: metrics
        run: |
          python3 - << 'EOF'
          import json
          import os
          from datetime import datetime, timedelta
          
          metrics = {
              "timestamp": datetime.now().isoformat(),
              "workflow_run_id": "${{ github.run_id }}",
              "branch": "${{ github.ref }}",
              "test_passed": "${{ needs.test-with-flaky-detection.outputs.test_failed }}" == "false",
              "test_duration_seconds": int("${{ needs.test-with-flaky-detection.outputs.test_duration }}" or "0"),
              "build_failure_rate": 0,
              "mttr_minutes": 0,
              "auto_fixed_incidents_percent": 0,
              "flaky_tests_count": 0
          }
          
          # Parse flaky tests
          if "${{ needs.test-with-flaky-detection.outputs.flaky_tests }}" != "":
              flaky_list = "${{ needs.test-with-flaky-detection.outputs.flaky_tests }}".split('\n')
              metrics["flaky_tests_count"] = len([t for t in flaky_list if t.strip()])
          
          # Try to load metrics history
          metrics_file = '.github/metrics/ci-metrics.json'
          history = []
          
          if os.path.exists(metrics_file):
              try:
                  with open(metrics_file, 'r') as f:
                      data = json.load(f)
                      if isinstance(data, list):
                          history = data[-29:]  # Keep last 30 runs
              except:
                  pass
          
          history.append(metrics)
          
          # Create directory if needed
          os.makedirs('.github/metrics', exist_ok=True)
          
          # Save metrics
          with open(metrics_file, 'w') as f:
              json.dump(history, f, indent=2)
          
          # Calculate aggregates for last 7 days
          recent = [m for m in history if (datetime.now() - datetime.fromisoformat(m['timestamp'])).days < 7]
          
          if recent:
              failed = sum(1 for m in recent if not m['test_passed'])
              failure_rate = (failed / len(recent) * 100) if recent else 0
              auto_fixed = sum(1 for m in recent if m['flaky_tests_count'] > 0 and m['test_passed'])
              auto_fixed_percent = (auto_fixed / len(recent) * 100) if recent else 0
              avg_mttr = sum(m['test_duration_seconds'] for m in recent) / len(recent) / 60 if recent else 0
              
              metrics['build_failure_rate'] = round(failure_rate, 2)
              metrics['mttr_minutes'] = round(avg_mttr, 2)
              metrics['auto_fixed_incidents_percent'] = round(auto_fixed_percent, 2)
          
          print(json.dumps(metrics, indent=2))
          
          with open('/tmp/current_metrics.json', 'w') as f:
              json.dump(metrics, f)
          EOF

      - name: 📊 Generate MTTR Dashboard
        run: |
          python3 - << 'EOF'
          import json
          import os
          from datetime import datetime
          
          metrics_file = '.github/metrics/ci-metrics.json'
          
          if not os.path.exists(metrics_file):
              print("No metrics found yet")
              exit(0)
          
          with open(metrics_file, 'r') as f:
              history = json.load(f)
          
          # Generate dashboard HTML
          dashboard_html = """
          <!DOCTYPE html>
          <html>
          <head>
              <title>Self-Healing CI Dashboard</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; margin: 20px; background: #f5f5f5; }
                  .container { max-width: 1200px; margin: 0 auto; }
                  .header { text-align: center; margin-bottom: 40px; }
                  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
                  .metric-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
                  .metric-value { font-size: 32px; font-weight: bold; color: #0969da; }
                  .metric-label { font-size: 14px; color: #666; margin-top: 8px; }
                  .status-good { color: #28a745; }
                  .status-warning { color: #ffc107; }
                  .status-bad { color: #dc3545; }
                  .chart { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
                  table { width: 100%; border-collapse: collapse; }
                  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
                  th { background: #f5f5f5; font-weight: 600; }
                  tr:hover { background: #f9f9f9; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🤖 Self-Healing CI Pipeline Dashboard</h1>
                      <p>Real-time metrics for build reliability and incident recovery</p>
                  </div>
                  
                  <div class="metric-grid">
          """
          
          # Calculate metrics
          if history:
              recent_7d = [m for m in history[-30:] if m.get('test_passed')]
              failed_count = sum(1 for m in history[-30:] if not m.get('test_passed'))
              failure_rate = (failed_count / len(history[-30:]) * 100) if history else 0
              auto_fixed = sum(1 for m in history[-30:] if m.get('flaky_tests_count', 0) > 0 and m.get('test_passed'))
              auto_fixed_percent = (auto_fixed / len(history[-30:]) * 100) if history else 0
              avg_mttr = sum(m.get('test_duration_seconds', 0) for m in history[-30:]) / len(history[-30:]) / 60 if history else 0
              total_flaky = sum(m.get('flaky_tests_count', 0) for m in history[-30:])
              
              # Add metric cards
              metrics_data = [
                  ('Build Success Rate', f"{100 - failure_rate:.1f}%", 'status-good' if failure_rate < 10 else 'status-warning' if failure_rate < 25 else 'status-bad'),
                  ('Avg MTTR (minutes)', f"{avg_mttr:.1f}", 'status-good' if avg_mttr < 5 else 'status-warning'),
                  ('Auto-Fixed Incidents', f"{auto_fixed_percent:.1f}%", 'status-good'),
                  ('Flaky Tests (30d)', str(total_flaky), 'status-warning' if total_flaky > 0 else 'status-good'),
              ]
              
              for label, value, status in metrics_data:
                  dashboard_html += f"""
                      <div class="metric-card">
                          <div class="metric-value {status}">{value}</div>
                          <div class="metric-label">{label}</div>
                      </div>
                  """
          
          dashboard_html += """
                  </div>
                  
                  <div class="chart">
                      <h2>Recent Build History (Last 15 Runs)</h2>
                      <table>
                          <thead>
                              <tr>
                                  <th>Run ID</th>
                                  <th>Branch</th>
                                  <th>Status</th>
                                  <th>Duration (s)</th>
                                  <th>Flaky Tests</th>
                                  <th>Timestamp</th>
                              </tr>
                          </thead>
                          <tbody>
          """
          
          if history:
              for run in history[-15:][::-1]:
                  status = '✅ PASS' if run.get('test_passed') else '❌ FAIL'
                  status_class = 'status-good' if run.get('test_passed') else 'status-bad'
                  dashboard_html += f"""
                      <tr>
                          <td>#{run.get('workflow_run_id', 'N/A')}</td>
                          <td>{run.get('branch', 'N/A')}</td>
                          <td><span class="{status_class}">{status}</span></td>
                          <td>{run.get('test_duration_seconds', 0)}s</td>
                          <td>{run.get('flaky_tests_count', 0)}</td>
                          <td>{run.get('timestamp', '')[:10]}</td>
                      </tr>
                  """
          
          dashboard_html += """
                          </tbody>
                      </table>
                  </div>
              </div>
          </body>
          </html>
          """
          
          # Write dashboard
          os.makedirs('.github/metrics', exist_ok=True)
          with open('.github/metrics/dashboard.html', 'w') as f:
              f.write(dashboard_html)
          
          print("Dashboard generated successfully")
          EOF

      - name: 📮 Commit metrics & dashboard
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Self-Healing CI Bot"
          git add .github/metrics/ || true
          git commit -m "🤖 Update CI metrics and dashboard [${{ github.run_id }}]" || true
          git push || true

  # ============================================================
  # Part 4: Automated PR Suggestions for Fixes
  # ============================================================
  suggest-fixes:
    name: 💡 Auto-Suggest Fixes via PR
    runs-on: ubuntu-latest
    needs: [test-with-flaky-detection, analyze-failures]
    if: |
      github.event_name == 'pull_request' &&
      (failure() || needs.test-with-flaky-detection.outputs.test_failed == 'true')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: 🔧 Generate fix suggestions
        id: suggests
        run: |
          python3 - << 'EOF'
          import json
          import os
          
          suggestions = []
          
          flaky_tests = """${{ needs.test-with-flaky-detection.outputs.flaky_tests }}""".strip()
          failed_tests = """${{ needs.test-with-flaky-detection.outputs.failed_tests }}""".strip()
          
          if flaky_tests:
              suggestions.append({
                  "type": "flaky-test",
                  "title": "🔴 Flaky Test Detected",
                  "description": "Some tests pass intermittently",
                  "fix": "- Add test isolation and cleanup\n- Increase timeout for async operations\n- Mock external dependencies\n- Use test fixtures with proper setup/teardown",
                  "tests": flaky_tests.split('\n')[:3]
              })
          
          if failed_tests:
              suggestions.append({
                  "type": "test-failure",
                  "title": "❌ Test Failures",
                  "description": "Review test assertions and dependencies",
                  "fix": "- Check test data setup\n- Verify dependency versions\n- Review recent code changes\n- Run tests locally for debugging"
              })
          
          # Save suggestions
          with open('/tmp/suggestions.json', 'w') as f:
              json.dump(suggestions, f, indent=2)
          
          print(f"Generated {len(suggestions)} suggestion(s)")
          EOF

      - name: 💬 Post fix suggestions to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca1c5290e953e # v7
        with:
          script: |
            const fs = require('fs');
            const suggestions = JSON.parse(fs.readFileSync('/tmp/suggestions.json', 'utf8'));
            
            let comment = `## 🔧 Automated Fix Suggestions\n\n`;
            
            if (suggestions.length === 0) {
                comment += "All tests are expected to pass. No fixes suggested.";
            } else {
                suggestions.forEach((suggestion, idx) => {
                    comment += `### ${suggestion.title}\n`;
                    comment += `**${suggestion.description}**\n\n`;
                    comment += `**Recommended Actions:**\n`;
                    comment += suggestion.fix + '\n\n';
                    
                    if (suggestion.tests && suggestion.tests.length > 0) {
                        comment += `**Affected Tests:**\n`;
                        suggestion.tests.forEach(test => {
                            comment += `- \`${test}\`\n`;
                        });
                        comment += '\n';
                    }
                });
            }
            
            comment += `---\n*Generated by 🤖 Self-Healing CI Pipeline*`;
            
            // Find or create comment
            const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
            });
            
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Automated Fix Suggestions'));
            
            if (botComment) {
                await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: botComment.id,
                    body: comment
                });
            } else {
                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: comment
                });
            }
